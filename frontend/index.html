<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ResumeCheck — AI Resume Screener</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --green: #00C27A;
    --bg: #0A0A0A;
    --bg2: #111111;
    --bg3: #181818;
    --border: rgba(255,255,255,0.07);
    --text: #F0F0F0;
    --muted: #888;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 2rem; height: 60px;
    background: var(--bg2); border-bottom: 1px solid var(--border);
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; }
  .logo span { color: var(--green); }

  .hero {
    text-align: center; padding: 3rem 2rem 1rem;
    background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,194,122,0.08) 0%, transparent 70%);
  }
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 6vw, 4rem);
    letter-spacing: 2px; line-height: 1; margin-bottom: 1rem;
  }
  .hero h1 span { color: var(--green); }
  .hero p { color: var(--muted); font-size: 1rem; max-width: 450px; margin: 0 auto 1.5rem; }

  /* Auth Styles */
  .auth-container { max-width: 700px; margin: 0 auto 2rem; padding: 0 2rem; }
  .auth-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; text-align: center; }
  .auth-input { 
    width: 100%; background: var(--bg3); border: 1px solid var(--border); 
    border-radius: 8px; color: white; padding: 10px; margin-bottom: 10px; outline: none;
  }
  .auth-input:focus { border-color: var(--green); }
  .auth-btns { display: flex; gap: 10px; }
  .logged-in-info { color: var(--green); font-size: 0.9rem; display: none; align-items: center; justify-content: center; gap: 15px; }

  /* Upload Styles */
  .upload-section { max-width: 700px; margin: 0 auto; padding: 0 2rem 4rem; }
  .upload-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin-bottom: 1rem; }
  .upload-box label { font-size: 0.85rem; color: var(--muted); display: block; margin-bottom: 0.5rem; }
  .file-drop {
    border: 2px dashed rgba(255,255,255,0.1); border-radius: 12px;
    padding: 2rem; text-align: center; cursor: pointer;
    transition: border-color .2s; margin-bottom: 1rem;
  }
  .file-drop:hover { border-color: var(--green); }
  .file-drop.has-file { border-color: var(--green); background: rgba(0,194,122,0.05); }
  .file-name { font-size: 0.9rem; color: var(--green); font-weight: 500; margin-top: 0.5rem; }
  
  textarea {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-family: 'Outfit', sans-serif;
    font-size: 0.9rem; padding: 1rem; resize: vertical; min-height: 130px;
    outline: none; transition: border-color .2s;
  }
  textarea:focus { border-color: var(--green); }

  .scan-btn {
    width: 100%; background: var(--green); border: none; color: #000;
    padding: 1rem; border-radius: 50px; font-family: 'Outfit', sans-serif;
    font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 1rem;
    transition: all .2s;
  }
  .scan-btn:hover { background: #00d988; transform: translateY(-2px); }
  .scan-btn:disabled { background: #1a4a35; color: #555; cursor: not-allowed; }

  .loading { display: none; text-align: center; padding: 3rem; }
  .loading.show { display: block; }
  .spinner {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--green); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .results { display: none; max-width: 700px; margin: 0 auto; padding: 0 2rem 4rem; }
  .results.show { display: block; }
  .score-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; text-align: center; margin-bottom: 1rem; }
  .score-number { font-family: 'Bebas Neue', sans-serif; font-size: 6rem; color: var(--green); line-height: 1; }
  .sections-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.75rem; margin-bottom: 1rem; }
  .section-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; }
  .info-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .keyword-list { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .keyword { background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.2); color: #ff8080; font-size: 0.78rem; padding: 0.25rem 0.7rem; border-radius: 50px; }
  .suggestion { display: flex; gap: 0.6rem; margin-bottom: 0.5rem; font-size: 0.875rem; color: var(--muted); line-height: 1.5; }
  .suggestion::before { content: '→'; color: var(--green); }

  .score-green { color: #00C27A; }
  .score-yellow { color: #F5C842; }
  .score-red { color: #ff6b6b; }
</style>
</head>
<body>

<nav>
  <div class="logo">Resume<span>Check</span></div>
  <div style="font-size:0.85rem;color:var(--muted)">Powered by AI</div>
</nav>

<div class="hero">
  <h1>CHECK YOUR RESUME<br/>AGAINST ANY <span>JOB</span></h1>
  <p>Login to save your scans and get personalized AI feedback.</p>
</div>

<div class="auth-container">
    <div class="auth-box">
        <div id="user-info" class="logged-in-info">
            <span>Welcome, <strong id="display-email"></strong></span>
            <button onclick="logout()" style="color:var(--muted); background:none; border:none; text-decoration:underline; cursor:pointer;">Logout</button>
        </div>
        <div id="login-form">
            <input type="email" id="auth-email" class="auth-input" placeholder="Email Address">
            <input type="password" id="auth-password" class="auth-input" placeholder="Password">
            <div class="auth-btns">
                <button class="scan-btn" onclick="handleAuth('login')" style="margin-top:0; flex:1;">Login</button>
                <button class="scan-btn" onclick="handleAuth('register')" style="margin-top:0; flex:1; background:var(--bg3); color:white; border:1px solid var(--green);">Register</button>
            </div>
        </div>
    </div>
</div>

<div class="upload-section" id="upload-section">
  <div class="upload-box">
    <label>Upload resume (PDF)</label>
    <div class="file-drop" id="file-drop" onclick="document.getElementById('file-input').click()">
      <div class="icon">📄</div>
      <p>Click to upload PDF</p>
      <div class="file-name" id="file-name"></div>
      <input type="file" id="file-input" accept=".pdf" style="display:none;"/>
    </div>

    <label>Job Description</label>
    <textarea id="job-desc" placeholder="Paste requirements here..."></textarea>

    <button class="scan-btn" id="scan-btn" onclick="scanResume()">Analyze Resume →</button>
  </div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <p>AI is analyzing your resume...</p>
</div>

<div class="results" id="results">
  <div class="score-card">
    <div class="score-number" id="overall-score">--</div>
    <div class="score-label">Overall Match Score</div>
    <div id="verdict" style="margin-top:10px; font-weight:300;"></div>
  </div>
  <div class="sections-grid" id="sections-grid"></div>
  <div class="info-card">
    <div style="font-size:0.85rem; font-weight:600; margin-bottom:10px;">Missing Keywords</div>
    <div class="keyword-list" id="keywords"></div>
  </div>
  <div class="info-card">
    <div style="font-size:0.85rem; font-weight:600; margin-bottom:10px;">Top Suggestions</div>
    <div id="suggestions"></div>
  </div>
  <button class="scan-btn" onclick="location.reload()" style="background:var(--bg3); color:white; border:1px solid var(--border);">← New Scan</button>
</div>

<script>
  const API_BASE = "https://resume-screener-qzel.onrender.com";
  const fileInput = document.getElementById('file-input');
  const fileName = document.getElementById('file-name');
  const fileDrop = document.getElementById('file-drop');

  // Load user session
  window.onload = () => {
      const token = localStorage.getItem('token');
      if (token) showLoggedIn(localStorage.getItem('email'));
  };

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) {
      fileName.textContent = fileInput.files[0].name;
      fileDrop.classList.add('has-file');
    }
  });

  async function handleAuth(type) {
    const email = document.getElementById('auth-email').value;
    const password = document.getElementById('auth-password').value;
    if(!email || !password) return alert("Enter credentials");

    const isLogin = type === 'login';
    const url = isLogin ? "/auth/login" : "/auth/register";
    const body = isLogin 
        ? new URLSearchParams({'username': email, 'password': password})
        : JSON.stringify({ email, password });

    try {
        const res = await fetch(API_BASE + url, {
            method: 'POST',
            headers: isLogin ? {'Content-Type': 'application/x-www-form-urlencoded'} : {'Content-Type': 'application/json'},
            body: body
        });
        const data = await res.json();
        if(res.ok) {
            if(isLogin) {
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('email', email);
                showLoggedIn(email);
            } else alert("Registered successfully! Now Login.");
        } else alert(data.detail || "Auth Failed");
    } catch(e) { alert("Server Error"); }
  }

  function showLoggedIn(email) {
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('user-info').style.display = 'flex';
      document.getElementById('display-email').textContent = email;
  }

  function logout() { localStorage.clear(); location.reload(); }

  async function scanResume() {
    const token = localStorage.getItem('token');
    if(!token) return alert("Please login first!");

    const file = fileInput.files[0];
    const jd = document.getElementById('job-desc').value;
    if(!file || !jd) return alert("Upload PDF and paste Job Description");

    document.getElementById('upload-section').style.display = 'none';
    document.getElementById('loading').classList.add('show');

    const fd = new FormData();
    fd.append('file', file);
    fd.append('job_description', jd);

    try {
        const res = await fetch(API_BASE + "/scan", {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: fd
        });
        if(res.status === 401) return logout();
        const data = await res.json();
        renderResults(data);
    } catch(e) { alert("Scan failed"); location.reload(); }
  }

  function renderResults(data) {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('results').classList.add('show');
    
    const score = data.overall_score;
    const scoreEl = document.getElementById('overall-score');
    scoreEl.textContent = score;
    scoreEl.className = 'score-number ' + (score > 70 ? 'score-green' : score > 40 ? 'score-yellow' : 'score-red');
    
    document.getElementById('verdict').textContent = data.verdict;
    
    const grid = document.getElementById('sections-grid');
    grid.innerHTML = Object.entries(data.sections).map(([key, val]) => `
        <div class="section-card">
            <div style="font-size:0.7rem; color:var(--muted); text-transform:uppercase;">${key.replace(/_/g,' ')}</div>
            <div style="font-family:'Bebas Neue'; font-size:1.8rem;">${val.score}</div>
            <div style="font-size:0.75rem; color:var(--muted);">${val.feedback}</div>
        </div>
    `).join('');

    document.getElementById('keywords').innerHTML = data.missing_keywords.map(k => `<span class="keyword">${k}</span>`).join('');
    document.getElementById('suggestions').innerHTML = data.top_suggestions.map(s => `<div class="suggestion">${s}</div>`).join('');
  }
</script>
</body>
</html>
