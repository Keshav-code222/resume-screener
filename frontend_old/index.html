<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ResumeCheck — AI Resume Screener</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --green: #00C27A;
    --bg: #0A0A0A;
    --bg2: #111111;
    --bg3: #181818;
    --border: rgba(255,255,255,0.07);
    --text: #F0F0F0;
    --muted: #888;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 2rem; height: 60px;
    background: var(--bg2); border-bottom: 1px solid var(--border);
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; }
  .logo span { color: var(--green); }

  .hero {
    text-align: center; padding: 4rem 2rem 2rem;
    background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,194,122,0.08) 0%, transparent 70%);
  }
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    letter-spacing: 2px; line-height: 1; margin-bottom: 1rem;
  }
  .hero h1 span { color: var(--green); }
  .hero p { color: var(--muted); font-size: 1.1rem; max-width: 500px; margin: 0 auto; }

  /* Upload Styles */
  .upload-section { max-width: 700px; margin: 0 auto; padding: 0 2rem 4rem; }
  .upload-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin-bottom: 1rem; }
  .upload-box label { font-size: 0.85rem; color: var(--muted); display: block; margin-bottom: 0.5rem; }
  .file-drop {
    border: 2px dashed rgba(255,255,255,0.1); border-radius: 12px;
    padding: 2.5rem; text-align: center; cursor: pointer;
    transition: border-color .2s; margin-bottom: 1.5rem;
  }
  .file-drop:hover { border-color: var(--green); }
  .file-drop.has-file { border-color: var(--green); background: rgba(0,194,122,0.05); }
  .file-name { font-size: 0.9rem; color: var(--green); font-weight: 500; margin-top: 0.5rem; }
  
  textarea {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-family: 'Outfit', sans-serif;
    font-size: 0.9rem; padding: 1rem; resize: vertical; min-height: 150px;
    outline: none; transition: border-color .2s;
  }
  textarea:focus { border-color: var(--green); }

  .scan-btn {
    width: 100%; background: var(--green); border: none; color: #000;
    padding: 1.1rem; border-radius: 50px; font-family: 'Outfit', sans-serif;
    font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 1.5rem;
    transition: all .2s;
  }
  .scan-btn:hover { background: #00d988; transform: translateY(-2px); }
  .scan-btn:disabled { background: #1a4a35; color: #555; cursor: not-allowed; }

  .loading { display: none; text-align: center; padding: 4rem; }
  .loading.show { display: block; }
  .spinner {
    width: 50px; height: 50px; border: 4px solid var(--border);
    border-top-color: var(--green); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 1.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .results { display: none; max-width: 700px; margin: 0 auto; padding: 0 2rem 4rem; }
  .results.show { display: block; }
  .score-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 3rem 2rem; text-align: center; margin-bottom: 1.5rem; }
  .score-number { font-family: 'Bebas Neue', sans-serif; font-size: 7rem; color: var(--green); line-height: 1; }
  .sections-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  .section-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
  .info-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .keyword-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .keyword { background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.2); color: #ff8080; font-size: 0.8rem; padding: 0.3rem 0.8rem; border-radius: 50px; }
  .suggestion { display: flex; gap: 0.75rem; margin-bottom: 0.75rem; font-size: 0.9rem; color: var(--muted); line-height: 1.6; }
  .suggestion::before { content: '→'; color: var(--green); font-weight: bold; }

  .score-green { color: #00C27A; }
  .score-yellow { color: #F5C842; }
  .score-red { color: #ff6b6b; }
</style>
</head>
<body>

<nav>
  <div class="logo">Resume<span>Check</span></div>
  <div style="font-size:0.85rem;color:var(--muted)">AI Analysis Engine</div>
</nav>

<div class="hero">
  <h1>CHECK YOUR RESUME<br/>AGAINST ANY <span>JOB</span></h1>
  <p>Get instant feedback on your resume compatibility using advanced AI.</p>
</div>

<div class="upload-section" id="upload-section">
  <div class="upload-box">
    <label>Upload resume (PDF)</label>
    <div class="file-drop" id="file-drop" onclick="document.getElementById('file-input').click()">
      <div style="font-size: 2.5rem; margin-bottom: 10px;">📄</div>
      <p>Click to upload PDF</p>
      <div class="file-name" id="file-name"></div>
      <input type="file" id="file-input" accept=".pdf" style="display:none;"/>
    </div>

    <label>Job Description</label>
    <textarea id="job-desc" placeholder="Paste the job requirements here... the more detail the better."></textarea>

    <button class="scan-btn" id="scan-btn" onclick="scanResume()">Analyze Resume →</button>
  </div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <p style="font-size: 1.1rem; color: var(--muted);">AI is analyzing your resume against the job description...</p>
</div>

<div class="results" id="results">
  <div class="score-card">
    <div class="score-number" id="overall-score">--</div>
    <div style="font-size: 1.2rem; margin-top: 10px;">Overall Match Score</div>
    <div id="verdict" style="margin-top:15px; font-weight:300; font-size: 1.1rem;"></div>
  </div>
  
  <div class="sections-grid" id="sections-grid"></div>
  
  <div class="info-card">
    <div style="font-size:0.9rem; font-weight:600; margin-bottom:15px; text-transform: uppercase; color: var(--green);">Missing Keywords</div>
    <div class="keyword-list" id="keywords"></div>
  </div>
  
  <div class="info-card">
    <div style="font-size:0.9rem; font-weight:600; margin-bottom:15px; text-transform: uppercase; color: var(--green);">Top Suggestions</div>
    <div id="suggestions"></div>
  </div>
  
  <button class="scan-btn" onclick="location.reload()" style="background:var(--bg3); color:white; border:1px solid var(--border);">← New Analysis</button>
</div>

<script>
  const API_BASE = "https://resume-screener-qzel.onrender.com";
  const fileInput = document.getElementById('file-input');
  const fileName = document.getElementById('file-name');
  const fileDrop = document.getElementById('file-drop');

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) {
      fileName.textContent = fileInput.files[0].name;
      fileDrop.classList.add('has-file');
    }
  });

  async function scanResume() {
    const file = fileInput.files[0];
    const jd = document.getElementById('job-desc').value;
    
    if(!file || !jd) {
      return alert("Please upload a PDF and paste the Job Description");
    }

    document.getElementById('upload-section').style.display = 'none';
    document.getElementById('loading').classList.add('show');

    const fd = new FormData();
    fd.append('file', file);
    fd.append('job_description', jd);

    try {
        const res = await fetch(`${API_BASE}/scan`, {
            method: 'POST',
            body: fd
        });
        
        if (!res.ok) {
          const errorData = await res.json();
          throw new Error(errorData.detail || "Server Error");
        }
        
        const data = await res.json();
        renderResults(data);
    } catch(e) { 
        alert("Scan failed: " + e.message); 
        location.reload(); 
    }
  }

  function renderResults(data) {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('results').classList.add('show');
    
    const score = data.overall_score;
    const scoreEl = document.getElementById('overall-score');
    scoreEl.textContent = score;
    scoreEl.className = 'score-number ' + (score > 75 ? 'score-green' : score > 50 ? 'score-yellow' : 'score-red');
    
    document.getElementById('verdict').textContent = data.verdict;
    
    const grid = document.getElementById('sections-grid');
    grid.innerHTML = Object.entries(data.sections).map(([key, val]) => `
        <div class="section-card">
            <div style="font-size:0.75rem; color:var(--muted); text-transform:uppercase; margin-bottom: 5px;">${key.replace(/_/g,' ')}</div>
            <div style="font-family:'Bebas Neue'; font-size:2rem; color: var(--green);">${val.score}</div>
            <div style="font-size:0.8rem; color:var(--muted); margin-top: 5px;">${val.feedback}</div>
        </div>
    `).join('');

    document.getElementById('keywords').innerHTML = data.missing_keywords.length > 0 
      ? data.missing_keywords.map(k => `<span class="keyword">${k}</span>`).join('')
      : '<p style="font-size: 0.9rem; color: var(--muted);">No major missing keywords found!</p>';
      
    document.getElementById('suggestions').innerHTML = data.top_suggestions.map(s => `<div class="suggestion">${s}</div>`).join('');
  }
</script>
</body>
</html>
